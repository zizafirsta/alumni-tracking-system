<!DOCTYPE html>
<html>

<head>
  <title>Alumni Tracking System</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrapper">

  <div class="sidebar">
    <h2>🎓 ATS</h2>
    <ul>
      <li>Dashboard</li>
      <li>Kelola Alumni</li>
      <li>Tracking</li>
      <li>Reports</li>
    </ul>
  </div>

  <div class="main">

    <nav class="navbar navbar-dark bg-danger">
      <span class="navbar-brand text-white ms-3">
        Alumni Tracking System
      </span>
    </nav>

    <div class="container mt-4">

      <div class="row text-center mb-4">

        <div class="col-md-3">
          <div class="card">
            <div class="card-body">
              <h5>Total Alumni</h5>
              <h3 id="total">0</h3>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card">
            <div class="card-body">
              <h5>Identified</h5>
              <h3 id="identified">0</h3>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card">
            <div class="card-body">
              <h5>Need Verification</h5>
              <h3 id="verify">0</h3>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card">
            <div class="card-body">
              <h5>Not Relevant</h5>
              <h3 id="not">0</h3>
            </div>
          </div>
        </div>

      </div>

      <div class="card mb-4">
        <div class="card-header">
          Tambah Data Alumni
        </div>

        <div class="card-body">
          <div class="row">

            <div class="col-md-3">
              <input id="name" class="form-control" placeholder="Nama Alumni">
            </div>

            <div class="col-md-3">
              <input id="prodi" class="form-control" placeholder="Program Studi">
            </div>

            <div class="col-md-3">
              <input id="tahun" class="form-control" placeholder="Tahun Lulus">
            </div>

            <div class="col-md-3">
              <button onclick="tambah()" class="btn btn-primary w-100">
                Tambah
              </button>
            </div>

          </div>
        </div>
      </div>

      <div class="d-flex gap-2 mb-3">

        <select onchange="filterStatus(this.value)" class="form-control">
          <option value="">Semua Status</option>
          <option value="Identified">Identified</option>
          <option value="Need Verification">Need Verification</option>
          <option value="Not Relevant">Not Relevant</option>
        </select>

        <button onclick="exportCSV()" class="btn btn-success">
          Export CSV
        </button>

      </div>

      <input id="search" class="form-control mb-3" placeholder="Cari Alumni..." onkeyup="searchAlumni()">

      <div class="card">
        <div class="card-header">
          Daftar Alumni
        </div>

        <div class="card-body">
          <table class="table table-striped">
            <thead>
              <tr>
                <th>Nama</th>
                <th>Program Studi</th>
                <th>Tahun</th>
                <th>Status</th>
                <th>Confidence</th>
                <th>Source</th>
                <th>Aksi</th>
              </tr>
            </thead>

            <tbody id="list"></tbody>

          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="loading" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; justify-content:center; align-items:center;">
  <div class="spinner-border text-light"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
